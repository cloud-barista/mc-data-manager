      sourceFilter:
        $ref: '#/definitions/models.ObjectFilterParams'
      sourcePoint:
        $ref: '#/definitions/models.ProviderConfig'
      targetPoint:
        $ref: '#/definitions/models.ProviderConfig'
    type: object
  models.BasicResponse:
    properties:
