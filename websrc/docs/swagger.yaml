      regionZoneInfo:
        $ref: '#/definitions/models.RegionZoneInfo'
      regionZoneInfoName:
        type: string
      verified:
        type: boolean
    type: object
  models.Content:
    properties:
      eTag:
        type: string
      key:
        type: string
      lastModified:
        type: string
      size:
        type: integer
      storageClass:
        type: string
    type: object
  models.CredentialCreateRequest:
    properties:
      credentialJson:
        type: object
      cspType:
        type: string
      name:
        type: string
      s3AccessKey:
        type: string
      s3SecretKey:
        type: string
    type: object
  models.DBEngineVersion:
    properties:
      engine:
        type: string
      engineVersion:
        type: string
    type: object
  models.DBInstance:
    properties:
      endpoint:
        type: string
      engine:
        type: string
      engineVersion:
        type: string
      instanceClass:
        type: string
      instanceId:
        type: string
      name:
        type: string
      port:
        type: integer
      provider:
        type: string
      region:
        type: string
      status:
        type: string
    type: object
  models.DataTask:
    properties:
      dummy:
        $ref: '#/definitions/models.GenFileParams'
      operationId:
        type: string
      sourceFilter:
        $ref: '#/definitions/models.ObjectFilterParams'
      sourcePoint:
        $ref: '#/definitions/models.ProviderConfig'
      targetPoint:
        $ref: '#/definitions/models.ProviderConfig'
    type: object
  models.GenFileParams:
    properties:
      checkCSV:
        type: boolean
      checkGIF:
        type: boolean
      checkJSON:
        type: boolean
      checkPNG:
        type: boolean
      checkSQL:
        type: boolean
      checkServerJSON:
        type: boolean
      checkServerSQL:
        type: boolean
      checkTXT:
        type: boolean
      checkXML:
        type: boolean
      checkZIP:
        type: boolean
      sizeCSV:
        type: string
      sizeGIF:
        type: string
      sizeJSON:
        type: string
      sizePNG:
        type: string
      sizeSQL:
        type: string
      sizeServerJSON:
        type: string
      sizeServerSQL:
        type: string
      sizeTXT:
        type: string
      sizeXML:
        type: string
      sizeZIP:
        type: string
    type: object
  models.GenarateTask:
    properties:
      dummy:
        $ref: '#/definitions/models.GenFileParams'
      operationId:
        type: string
      tag:
        items:
          type: string
        type: array
      targetPoint:
        $ref: '#/definitions/models.ProviderConfig'
    type: object
  models.Location:
    properties:
      display:
        type: string
      latitude:
        type: number
      longitude:
        type: number
    type: object
  models.MigrateTask:
    properties:
      sourceFilter:
        $ref: '#/definitions/models.ObjectFilterParams'
      sourcePoint:
        $ref: '#/definitions/models.ProviderConfig'
      targetPoint:
        $ref: '#/definitions/models.ProviderConfig'
    type: object
  models.NRDBTableListResponse:
    properties:
      tables:
        items:
          type: string
        type: array
    type: object
  models.NRDBTableRequest:
    properties:
      tableName:
        type: string
      targetPoint:
        $ref: '#/definitions/models.ProviderConfig'
    type: object
  models.ObjectDeleteRequest:
    properties:
      objectKey:
        type: string
      targetPoint:
        $ref: '#/definitions/models.ProviderConfig'
    type: object
  models.ObjectFilterParams:
    properties:
      containExcludeYn:
        type: string
      contains:
        items:
          type: string
        type: array
      exact:
        items:
          type: string
        type: array
      maxSize:
        type: number
      minSize:
        type: number
      modifiedAfter:
        type: string
      modifiedBefore:
        type: string
      path:
        type: string
      pathExcludeYn:
        type: string
      sizeFilteringUnit:
        type: string
      suffixes:
        items:
          type: string
        type: array
    type: object
  models.ObjectInfo:
    properties:
      eTag:
        type: string
      key:
        type: string
      lastModified:
        type: string
      size:
        type: integer
      storageClass:
        type: string
    type: object
  models.ObjectListResponse:
    properties:
      objects:
        items:
          $ref: '#/definitions/models.ObjectInfo'
        type: array
    type: object
  models.ObjectStorage:
    properties:
      conditions:
        items:
          $ref: '#/definitions/models.Condition'
        type: array
      connectionConfig:
        $ref: '#/definitions/models.ConnectionConfig'
      connectionName:
        type: string
      contents:
        items:
          $ref: '#/definitions/models.Content'
        type: array
      creationDate:
        type: string
      cspResourceId:
        type: string
      cspResourceName:
        type: string
      description:
        type: string
      id:
        type: string
      isTruncated:
        type: boolean
      marker:
        type: string
      maxKeys:
        type: integer
      name:
        type: string
      prefix:
        type: string
      resourceType:
        type: string
      status:
        type: string
      systemMessage:
        type: string
      uid:
        type: string
    type: object
  models.ObjectStorageListResponse:
    properties:
      objectStorage:
        items:
          $ref: '#/definitions/models.ObjectStorage'
        type: array
    type: object
  models.ProviderConfig:
    properties:
      bucket:
        type: string
      credentialId:
        type: integer
      databaseId:
        type: string
      databaseName:
        type: string
      endpoint:
        type: string
      host:
        type: string
      password:
        type: string
      path:
        type: string
      port:
        type: string
      projectId:
        type: string
      provider:
        type: string
      region:
        type: string
      username:
        type: string
    type: object
  models.RDBEngineVersionsRequest:
    properties:
      credentialId:
        type: integer
      provider:
        type: string
      region:
        type: string
    type: object
  models.RDBInstanceClassRequest:
    properties:
      credentialId:
        type: integer
      engine:
        type: string
      engineVersion:
        type: string
      provider:
        type: string
      region:
        type: string
    type: object
  models.RDBInstanceCreateRequest:
    properties:
      allocatedStorage:
        type: integer
      credentialId:
        type: integer
      engine:
        type: string
      engineVersion:
        type: string
      instanceClass:
        type: string
      instanceId:
        type: string
      masterPassword:
        type: string
      masterUsername:
        type: string
      provider:
        type: string
      region:
        type: string
    type: object
  models.RDBInstanceListRequest:
    properties:
      credentialId:
        type: integer
      provider:
        type: string
      region:
        type: string
    type: object
  models.RegionDetail:
    properties:
      description:
        type: string
      location:
        $ref: '#/definitions/models.Location'
      regionId:
        type: string
      regionName:
        type: string
      zones:
        items:
          type: string
        type: array
    type: object
  models.RegionZoneInfo:
    properties:
      assignedRegion:
        type: string
      assignedZone:
        type: string
    type: object
  models.RestoreTask:
    properties:
      dummy:
        $ref: '#/definitions/models.GenFileParams'
      operationId:
        type: string
      sourceFilter:
        $ref: '#/definitions/models.ObjectFilterParams'
      sourcePoint:
        $ref: '#/definitions/models.ProviderConfig'
      targetPoint:
        $ref: '#/definitions/models.ProviderConfig'
    type: object
  models.Schedule:
    properties:
      ScheduleID:
        type: string
      ScheduleName:
        type: string
      cron:
        type: string
      operationId:
        type: string
      startTime:
        type: string
      status:
        $ref: '#/definitions/models.Status'
      tag:
        items:
          type: string
        type: array
      tasks:
        items:
          $ref: '#/definitions/models.BasicDataTask'
        type: array
      tz:
        type: string
    type: object
  models.Status:
    enum:
    - active
    - inactive
    - pending
    - completed
    - failed
    type: string
    x-enum-varnames:
    - StatusActive
    - StatusInactive
    - StatusPending
    - StatusCompleted
    - StatusFailed
  models.Task:
    properties:
      operationId:
        type: string
      tag:
        items:
          type: string
        type: array
    type: object
info:
  contact:
    email: contact-to-cloud-barista@googlegroups.com
    name: API Support
    url: http://cloud-barista.github.io
  description: MC-Data-Manager REST API
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  title: MC-Data-Manager REST API
  version: latest
paths:
  /backup:
    get:
      description: Retrieve a list of all Tasks in the system.
      operationId: GetAllBackupHandler
      produces:
      - application/json
      responses:
        "200":
          description: Successfully retrieved all Tasks
          schema:
            items:
              $ref: '#/definitions/models.Task'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.BasicResponse'
      summary: Get all Tasks
      tags:
      - '[Backup]'
  /backup/{id}:
    delete:
      description: Delete an existing Task using its ID.
      operationId: DeleteBackupkHandler
      parameters:
      - description: Task ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Successfully deleted the Task
          schema:
            $ref: '#/definitions/models.BasicResponse'
        "404":
          description: Task not found
          schema:
            $ref: '#/definitions/models.BasicResponse'
      summary: Delete a Task
      tags:
      - '[Backup]'
    get:
      consumes:
      - application/json
      description: Get the details of a Task using its ID.
      operationId: GetBackupHandler
      parameters:
      - description: Task ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Successfully retrieved a Task
          schema:
            $ref: '#/definitions/models.Task'
        "404":
          description: Task not found
          schema:
            $ref: '#/definitions/models.BasicResponse'
      summary: Get a Task by ID
      tags:
      - '[Backup]'
    put:
      consumes:
      - application/json
      description: Update the details of an existing Task using its ID.
      operationId: UpdateBackupHandler
      parameters:
      - description: Task ID
        in: path
        name: id
        required: true
        type: string
      - description: Parameters required for updating a Task
        in: body
        name: RequestBody
        required: true
        schema:
          $ref: '#/definitions/models.Schedule'
      produces:
      - application/json
      responses:
        "200":
          description: Successfully updated the Task
          schema:
            $ref: '#/definitions/models.BasicResponse'
        "404":
          description: Task not found
          schema:
            $ref: '#/definitions/models.BasicResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.BasicResponse'
      summary: Update an existing Task
      tags:
      - '[Backup]'
  /backup/nrdbms:
    post:
      consumes:
      - application/json
      description: Export data from a MySQL database to SQL files.
      operationId: BackupNRDBPostHandler
      parameters:
      - description: Parameters required for backup
        in: body
        name: RequestBody
        required: true
        schema:
          $ref: '#/definitions/models.BackupTask'
      produces:
      - application/json
      responses:
        "200":
          description: Successfully backup data
          schema:
            $ref: '#/definitions/models.BasicResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.BasicResponse'
      summary: Export data from MySQL
      tags:
      - '[Backup]'
  /backup/objectstorage:
    post:
      consumes:
      - application/json
      description: Export data from a objectstorage  to files.
      operationId: BackupOSPostHandler
      parameters:
      - description: Parameters required for backup
        in: body
        name: RequestBody
        required: true
        schema:
          $ref: '#/definitions/models.BackupTask'
      produces:
      - application/json
      responses:
        "200":
          description: Successfully backup data
          schema:
            $ref: '#/definitions/models.BasicResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.BasicResponse'
      summary: Export data from objectstorage
      tags:
      - '[Backup]'
  /backup/rdbms:
    post:
      consumes:
      - application/json
      description: Export data from a MySQL database to SQL files.
      operationId: BackupRDBPostHandler
      parameters:
      - description: Parameters required for backup
        in: body
        name: RequestBody
        required: true
        schema:
          $ref: '#/definitions/models.BackupTask'
      produces:
      - application/json
      responses:
        "200":
          description: Successfully backup data
          schema:
            $ref: '#/definitions/models.BasicResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.BasicResponse'
      summary: Export data from MySQL
      tags:
      - '[Backup]'
  /credentials:
    get:
      description: Retrieve a list of all credentials in the system.
      operationId: ListCredentialsHandler
      produces:
      - application/json
      responses:
        "200":
          description: Successfully retrieved all credentials
          schema:
            items:
              $ref: '#/definitions/models.Task'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.BasicResponse'
      summary: Get all credentials
      tags:
      - '[Credential]'
    post:
      consumes:
      - application/json
      description: save encrypted credential.
      operationId: CreateCredentialHandler
      parameters:
      - description: Parameters required for Credential
        in: body
        name: RequestBody
        required: true
        schema:
          $ref: '#/definitions/models.CredentialCreateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Successfully saved credential
          schema:
            $ref: '#/definitions/models.BasicResponse'
        "400":
          description: Invalid Request
          schema:
            $ref: '#/definitions/models.BasicResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.BasicResponse'
      summary: save encrypted credential.
      tags:
      - '[Credential]'
  /credentials/{id}:
    delete:
      description: Delete an existing credential using its ID.
      operationId: DeleteCredentialHandler
      parameters:
      - description: Credential ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Successfully deleted Credential
          schema:
            $ref: '#/definitions/models.BasicResponse'
        "404":
          description: Credential not found
          schema:
            $ref: '#/definitions/models.BasicResponse'
      summary: Delete a credential
      tags:
      - '[Credential]'
    get:
      consumes:
      - application/json
      description: Get the details of a Credential using its ID.
      operationId: GetCredentialHandler
      parameters:
      - description: Credential ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Successfully retrieved credential
          schema:
            $ref: '#/definitions/models.Task'
        "404":
          description: Task not found
          schema:
            $ref: '#/definitions/models.BasicResponse'
      summary: Get a Credential by ID
      tags:
      - '[Credential]'
  /db/nrdbms:
    delete:
      consumes:
      - application/json
      description: |-
        Deletes the table (collection) with the given name and all its data.
        Supported providers: aws (DynamoDB), gcp (Firestore), ncp (MongoDB), alibaba (MongoDB).
      operationId: NRDBMSDeleteTableHandler
      parameters:
      - description: Provider credentials, connection info, and table name
        in: body
        name: RequestBody
        required: true
        schema:
          $ref: '#/definitions/models.NRDBTableRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Table deleted successfully
          schema:
            $ref: '#/definitions/models.BasicResponse'
        "400":
          description: Bad Request — tableName is empty
          schema:
            $ref: '#/definitions/models.BasicResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.BasicResponse'
      summary: Delete a table from a NRDBMS instance
      tags:
      - '[NRDBMS]'
    post:
      consumes:
      - application/json
      description: |-
        Returns the list of tables (collections) accessible with the given credentials.
        Supported providers: aws (DynamoDB), gcp (Firestore), ncp (MongoDB), alibaba (MongoDB).
      operationId: NRDBMSListTablesHandler
      parameters:
      - description: Provider credentials and connection info
        in: body
        name: RequestBody
        required: true
        schema:
          $ref: '#/definitions/models.DataTask'
      produces:
      - application/json
      responses:
        "200":
          description: List of tables
          schema:
            $ref: '#/definitions/models.NRDBTableListResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.NRDBTableListResponse'
      summary: List tables in a NRDBMS instance
      tags:
      - '[NRDBMS]'
    put:
      consumes:
      - application/json
      description: |-
        Creates a table (collection) with the given name. If the table already exists the request is a no-op.
        Supported providers: aws (DynamoDB), gcp (Firestore), ncp (MongoDB), alibaba (MongoDB).
      operationId: NRDBMSCreateTableHandler
      parameters:
      - description: Provider credentials, connection info, and table name
        in: body
        name: RequestBody
        required: true
        schema:
          $ref: '#/definitions/models.NRDBTableRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Table created successfully
          schema:
            $ref: '#/definitions/models.BasicResponse'
        "400":
          description: Bad Request — tableName is empty
          schema:
            $ref: '#/definitions/models.BasicResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.BasicResponse'
      summary: Create a table in a NRDBMS instance
      tags:
      - '[NRDBMS]'
  /db/rdbms:
    post:
      consumes:
      - application/json
      description: |-
        Returns managed database instances for the requested CSP and region.
        Credentials are resolved by provider (one credential per CSP). Only AWS is supported for now.
      operationId: ListRDBInstancesHandler
      parameters:
      - description: Provider and region
        in: body
        name: RequestBody
        required: true
        schema:
          $ref: '#/definitions/models.RDBInstanceListRequest'
      produces:
      - application/json
      responses:
        "200":
          description: List of database instances
          schema:
            items:
              $ref: '#/definitions/models.DBInstance'
            type: array
        "400":
          description: Invalid Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List RDB (database) instances for a given provider
      tags:
      - '[RDB Instance]'
    put:
      consumes:
      - application/json
      description: |-
        Provisions a new managed database instance for the requested CSP.
        Only AWS with mysql/mariadb engines is supported. The instance is created publicly accessible.
      operationId: CreateRDBInstanceHandler
      parameters:
      - description: Instance specification
        in: body
        name: RequestBody
        required: true
        schema:
          $ref: '#/definitions/models.RDBInstanceCreateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 'Created instance (status: creating)'
          schema:
            $ref: '#/definitions/models.DBInstance'
        "400":
          description: Invalid Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create an RDB (database) instance
      tags:
      - '[RDB Instance]'
  /db/rdbms/engine-versions:
    post:
      consumes:
      - application/json
      description: Returns available mysql and mariadb engine versions for the requested
        CSP and region.
      operationId: ListRDBEngineVersionsHandler
      parameters:
      - description: Provider and region
        in: body
        name: RequestBody
        required: true
        schema:
          $ref: '#/definitions/models.RDBEngineVersionsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Available engine versions
          schema:
            items:
              $ref: '#/definitions/models.DBEngineVersion'
            type: array
        "400":
          description: Invalid Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List available RDB engine versions
      tags:
      - '[RDB Instance]'
  /db/rdbms/instance-class:
    post:
      consumes:
      - application/json
      description: Returns the instance classes orderable for the given engine and
        version.
      operationId: ListRDBInstanceClassesHandler
      parameters:
      - description: Provider, region, engine, engineVersion
        in: body
        name: RequestBody
        required: true
        schema:
          $ref: '#/definitions/models.RDBInstanceClassRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Available instance class names
          schema:
            items:
              type: string
            type: array
        "400":
          description: Invalid Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List orderable RDB instance classes
      tags:
      - '[RDB Instance]'
  /generate:
    get:
      description: Retrieve a list of all Tasks in the system.
      operationId: GetAllGenerateHandler
      produces:
      - application/json
      responses:
        "200":
          description: Successfully retrieved all Tasks
          schema:
            items:
              $ref: '#/definitions/models.Task'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.BasicResponse'
      summary: Get all Tasks
      tags:
      - '[Generate]'
  /generate/{id}:
    delete:
      description: Delete an existing Task using its ID.
      operationId: DeleteGeneratekHandler
      parameters:
      - description: Task ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Successfully deleted the Task
          schema:
            $ref: '#/definitions/models.BasicResponse'
        "404":
          description: Task not found
          schema:
