<ol class="breadcrumb mb-1" style="margin-top: 66px;">
    <li class="breadcrumb-item">Restore</li>
</ol>
<h2 class="page-title" id="title">Object Storage</h2>

<div class="card mb-4 rounded-3 col-auto">
    <ul class="nav nav-tabs pt-2 ps-2" id="serviceTabs">
        <li class="nav-item">
          <a class="nav-link active" href="#">Object Storage</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">SQL Database</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">No-SQL</a>
        </li>
    </ul>
    <div class="card-body">
        <form id="restoreForm">
            <input type="hidden" id="backSource" value="restore">
            <input type="hidden" id="backDest" value="restore">
            <input type="hidden" id="targetPoint[provider]" value="none">
            <input type="hidden" id="targetPoint[endpoint]" name="targetPoint[endpoint]" value="">
            <input type="hidden" id="targetService" value="objectstorage">
            <div class="card rounded-3 mb-3 p-3">
                <div class="input-group mb-3">
                    <div class="form-floating">
                        <input type="text" class="form-control" id="sourcePointLabel" placeholder="Source" style="border: 0; background-color: white;" value="Restore Path" required disabled>
                        <label for="sourcePointLabel">Source</label>
                    </div>
                </div>
                <div class="input-group">
                    <span class="input-group-text rounded-start"><i class="fas fa-folder"></i></span>
                    <div class="form-floating">
                      <input type="text" class="form-control rounded-end" id="mig-linux-path" name="sourcePoint[path]" value="/tmp/dummy" placeholder="디렉토리 경로">
                      <label for="mig-linux-path">Path</label>
                    </div>
                </div>
            </div>
            <div class="card rounded-3 mb-3 p-3">
                <div class="input-group mb-3">
                    <div class="form-floating">
                        <input type="text" class="form-control rounded-end" id="targetPointLabel" placeholder="Target" style="border: 0; background-color: white;" value="-" required disabled>
                        <label for="targetPointLabel">Target</label>
                    </div>
                </div>
                <div id="credentialDiv">
                    <div class="input-group mb-3 me-1">
                        <span class="input-group-text rounded-start"><i class="fa-solid fa-user-secret"></i></span>
                        <div class="form-floating">
                            <select class="form-select form-select-sm rounded-end" id="targetCredentialSelect" name="targetPoint[credentialId]">
                                <option value="none" data-provider="none"> - </option>
                            </select>
                            <label for="targetCredentialSelect">provider - credential name</label>
                        </div>
                    </div>
                    <div class="input-group">
                        <span class="input-group-text rounded-start"><i class="fa-solid fa-globe"></i></span>
                        <div class="form-floating">
                            <select class="form-select form-select-sm rounded-end" id="targetRegionSelect" name="targetPoint[region]">
                                <option value="none" selected> - </option>
                                <optgroup label="AWS regions" data-provider="aws" style="display: none;">
                                    {{ range $index, $value := .AWSRegions }}
                                        <option value="{{ $value }}">{{ $value }}</option>
                                    {{ end }}
                                </optgroup>
                                <optgroup label="GCP regions" data-provider="gcp" style="display: none;">
                                    {{ range $index, $value := .GCPRegions }}
                                        <option value="{{ $value }}">{{ $value }}</option>
                                    {{ end }}
                                </optgroup>
                                <optgroup label="NCP regions" data-provider="ncp" style="display: none;">
                                    {{ range $index, $value := .NCPRegions }}
                                        <option value="{{ $value }}">{{ $value }}</option>
                                    {{ end }}
                                </optgroup>
                                <optgroup label="ALIBABA regions" data-provider="alibaba" style="display: none;">
                                    {{ range $index, $value := .ALIBABARegions }}
                                        <option value="{{ $value }}">{{ $value }}</option>
                                    {{ end }}
                                </optgroup>
                                <optgroup label="IBM regions" data-provider="ibm" style="display: none;">
                                    {{ range $index, $value := .IBMRegions }}
                                        <option value="{{ $value }}">{{ $value }}</option>
                                    {{ end }}
                                </optgroup>
                                <optgroup label="KT regions" data-provider="kt" style="display: none;">
                                    {{ range $index, $value := .KTRegions }}
                                        <option value="{{ $value }}">{{ $value }}</option>
                                    {{ end }}
                                </optgroup>
                                <optgroup label="TENCENT regions" data-provider="tencent" style="display: none;">
                                    {{ range $index, $value := .TencentRegions }}
                                        <option value="{{ $value }}">{{ $value }}</option>
                                    {{ end }}
                                </optgroup>
                            </select>
                            <label for="targetRegionSelect">Select Region</label>
                        </div>
                    </div>
                </div>
                <div class="form-section mt-3" id="objectstorage" style="display:none;">
                    <div class="input-group">
                        <span class="input-group-text rounded-start"><i class="fa-solid fa-bucket"></i></span>
                        <div class="form-floating">
                            <!-- <input type="text" class="form-control rounded-end" id="targetBucket" name="targetPoint[bucket]" placeholder="Bucket" required> -->
                            <select class="form-select form-select-sm rounded-end" id="targetBucket" name="targetPoint[bucket]">
                                <option value="-" selected>-</option>
                            </select>
                            <label for="targetBucket">Bucket</label>
                        </div>
                        <button type="button" class="btn btn-primary rounded-3 ms-2" id="targetBtn">
                            <i class="fa-solid fa-magnifying-glass"></i>
                        </button>
                    </div>
                    <div class="input-group mt-3" id="targetNewBucket" style="display: none;">
                        <span class="input-group-text rounded-start"><i class="fa-solid fa-bucket"></i></span>
                        <div class="form-floating">
                            <input type="text" class="form-control rounded-end" id="newBucket" name="targetPoint[bucket]" placeholder="Bucket">
                            <label for="newBucket">New Bucket</label>
                        </div>
                    </div>
                </div>
                <div class="form-section mt-3" id="rdbms" style="display:none;">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <span class="text-muted small fw-semibold">Instance List</span>
                        <div class="input-group input-group-sm" style="width:200px;">
                            <span class="input-group-text"><i class="fa-solid fa-magnifying-glass"></i></span>
                            <input type="text" class="form-control" id="rdbms-search" placeholder="Search by name">
                        </div>
                    </div>
                    <table class="table table-bordered table-sm mb-0">
                        <thead>
                            <tr>
                                <th style="width:36px;"></th>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Status</th>
                                <th>Version</th>
                                <th>Host (endpoint)</th>
                                <th>Port</th>
                                <th>InstanceClass</th>
                            </tr>
                        </thead>
                        <tbody id="restore-rdbms-table-body">
                            <tr><td colspan="8" class="text-center text-muted small py-3">Credential과 Region을 선택하면 인스턴스 목록을 조회합니다</td></tr>
                        </tbody>
                    </table>
                    <div id="restore-rdbms-pagination" class="mt-2"></div>

                    <div id="restore-rdbms-connect" style="display:none;" class="mt-3">
                        <div class="input-group mb-3">
                            <span class="input-group-text rounded-start"><i class="fa-solid fa-house"></i></span>
                            <div class="form-floating">
                                <input type="text" class="form-control rounded-end bg-light" id="mysql-srcHost" name="targetPoint[host]" placeholder="Host / IP" readonly>
                                <label for="mysql-srcHost">Host / IP</label>
                            </div>
                        </div>
                        <div class="input-group mb-3">
                            <span class="input-group-text rounded-start"><i class="fa-solid fa-flag"></i></span>
                            <div class="form-floating">
                                <input type="text" class="form-control rounded-end bg-light" id="mysql-srcPort" name="targetPoint[port]" placeholder="Port" readonly>
                                <label for="mysql-srcPort">Port</label>
                            </div>
                        </div>
                        <div class="input-group mb-3">
                            <span class="input-group-text rounded-start"><i class="fa-solid fa-user"></i></span>
                            <div class="form-floating">
                                <input type="text" class="form-control rounded-end" id="mysql-srcUsername" name="targetPoint[username]" placeholder="Username">
                                <label for="mysql-srcUsername">Username</label>
                            </div>
                        </div>
                        <div class="input-group">
                            <span class="input-group-text rounded-start"><i class="fa-solid fa-lock"></i></span>
                            <div class="form-floating">
                                <input type="password" class="form-control rounded-end" id="mysql-srcPassword" name="targetPoint[password]" placeholder="Password">
                                <label for="mysql-srcPassword">Password</label>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="form-section mt-3" id="mongo-nrdbms" style="display:none;">
                    <div class="input-group mb-3">
                        <span class="input-group-text rounded-start"><i class="fa-solid fa-house"></i></span>
                        <div class="form-floating">
                            <input type="text" class="form-control rounded-end" id="nosql-srcHost" name="targetPoint[host]" placeholder="Host / IP">
                            <label for="nosql-srcHost">Host / IP</label>
                        </div>
                    </div>    
                    <div class="input-group mb-3">
                        <span class="input-group-text rounded-start"><i class="fa-solid fa-flag"></i></span>
                        <div class="form-floating">
                            <input type="text" class="form-control rounded-end" id="nosql-srcPort" name="targetPoint[port]" placeholder="Port">
                            <label for="nosql-srcPort">Port</label>
                        </div>
                    </div>    
                    <div class="input-group mb-3">
                        <span class="input-group-text rounded-start"><i class="fa-solid fa-user"></i></span>
                        <div class="form-floating">
                            <input type="text" class="form-control rounded-end" id="nosql-srcUsername" name="targetPoint[username]" placeholder="Username">
                            <label for="nosql-srcUsername">Username</label>
                        </div>
                    </div>    
                    <div class="input-group mb-3">
                        <span class="input-group-text rounded-start"><i class="fa-solid fa-lock"></i></span>
                        <div class="form-floating">
                            <input type="password" class="form-control rounded-end" id="nosql-srcPassword" name="targetPoint[password]" placeholder="Password">
                            <label for="nosql-srcPassword">Password</label>
                        </div>
                    </div>
                    <div class="input-group">
                        <span class="input-group-text rounded-start"><i class="fa-solid fa-database"></i></span>
                        <div class="form-floating">
                            <input type="text" class="form-control rounded-end" id="nosql-databaseName" name="targetPoint[databaseName]" placeholder="DataBase">
                            <label for="nosql-databaseName">DataBase Name</label>
                        </div>
                    </div>
                </div>
            </div>
            <button type="submit" class="btn btn-primary rounded-3 float-end" id="submitBtn">Submit</button>
        </form>
    </div>
</div>

<style>
@keyframes ic-spin      { to { transform: rotate(360deg); } }
@keyframes ic-spin-slow { to { transform: rotate(360deg); } }
.ic-spin      { display:inline-block; animation: ic-spin 1s linear infinite; }
.ic-spin-slow { display:inline-block; animation: ic-spin-slow 3s linear infinite; }
</style>
<script>
const target = {
        btn: document.getElementById("targetBtn"),
        cred: document.getElementById("targetCredentialSelect"),
        region: document.getElementById("targetRegionSelect"),
        bucket: document.getElementById("targetBucket"),
        provider: document.getElementById("targetPoint[provider]"),
        endpoint: document.getElementById("targetPoint[endpoint]"),
        service: document.getElementById("targetService")
    };
    const bucketInput = document.getElementById("newBucket");

    document.addEventListener("DOMContentLoaded", () => {
        const tabs = document.querySelectorAll("#serviceTabs .nav-link");
        // 텍스트 → 코드값 매핑
        const serviceMap = {
            "Object Storage": "objectstorage",
            "SQL Database": "rdbms",
            "No-SQL": "nrdbms"
        };

        tabs.forEach(tab => {
            tab.addEventListener("click", e => {
                e.preventDefault(); // a 태그 기본 이동 막기

                // 모든 탭에서 active 제거
                tabs.forEach(t => t.classList.remove("active"));

                // 선택한 탭만 active 추가
                tab.classList.add("active");

                // hidden input 값 갱신 (텍스트 그대로 사용)
                const key = tab.textContent.trim();
                target.service.value = serviceMap[key] || "";

                updateFormVisibility()

                document.getElementById("title").innerHTML = key
            });
        });
        
        target.provider.addEventListener('change', e => {
            updateFormVisibility()
        });
    });    
    
    function updateLabel(provider, service) {
        const serviceMap = {
            nrdbms: {
                aws: "AWS DynamoDB",
                ncp: "Naver MongoDB",
                gcp: "Google Firestore",
                alibaba: "Alibaba MongoDB",
            },
            objectstorage: {
                aws: "AWS S3",
                ncp: "Naver Object Storage",
                gcp: "Google Cloud Storage",
                alibaba: "Alibaba Cloud OSS",
            },
            rdbms: {
                default: "MySQL",
            },
        };

        let serviceName = "-";
        const providers = serviceMap[service];
        if (providers) {
            serviceName = providers[provider] || providers.default || "-";
        } 

        const select = document.getElementById("targetPointLabel");   // label 갱신
        select.value = serviceName
    }

    function updateFormVisibility() {
        var provider = target.provider.value;
        var service = target.service.value;
        var idToShow = provider + '-' + service;

        if (service === 'nrdbms' && (provider === 'ncp' || provider === 'alibaba')) {
            idToShow = 'mongo-nrdbms';
        }

        updateLabel(provider, service)
        
        const credentialDiv = document.getElementById("credentialDiv")
        if(service === 'rdbms') {
            idToShow = 'rdbms';
            credentialDiv.style.display = ""
            credentialDiv.querySelectorAll("select").forEach(input => {
                input.removeAttribute('disabled');
                input.setAttribute('required', '');
            })
        } else {
            if(service === 'objectstorage') {
                idToShow = 'objectstorage';
            }
            credentialDiv.style.display = ""
            credentialDiv.querySelectorAll("select").forEach(input => {
                input.removeAttribute('disabled');
                input.setAttribute('required', '');
            })

            // No-SQL + NCP/Alibaba 인 경우 Region 선택 불필요
            const regionSelectWrapper = document.getElementById("targetRegionSelect");
            const regionInputGroup = regionSelectWrapper ? regionSelectWrapper.closest(".input-group") : null;
            const isNoSqlNonRegion = service === 'nrdbms' && (provider === 'ncp' || provider === 'alibaba');
            if (regionInputGroup) {
                if (isNoSqlNonRegion) {
                    regionInputGroup.style.display = "none";
                    regionSelectWrapper.removeAttribute('required');
                    regionSelectWrapper.setAttribute('disabled', '');
                } else {
                    regionInputGroup.style.display = "";
                    regionSelectWrapper.removeAttribute('disabled');
                    regionSelectWrapper.setAttribute('required', '');
                }
            }
        }

        var allInputs = document.querySelectorAll('.form-section input, .form-section select, .form-section textarea');
        allInputs.forEach(function(input) {
            if (input.type === 'checkbox' || input.type === 'radio') {
                input.checked = false;
            } else if (input.tagName.toLowerCase() === 'select') {
                input.selectedIndex = 0; 
            } else {
                input.value = '';
            }
            input.removeAttribute('required');
        });


        var formSections = document.getElementsByClassName('form-section');
        for (var i = 0; i < formSections.length; i++) {
            var section = formSections[i];
            if (section.id === idToShow) {
                section.style.display = 'block';
                var inputs = section.querySelectorAll('input, select, textarea');
                inputs.forEach(function(input) {
                    if (!input.name) return;
                    input.removeAttribute('disabled');
                    input.setAttribute('required', '');
                });
            } else {
                section.style.display = 'none';
                var inputs = section.querySelectorAll('input, select, textarea');
                inputs.forEach(function(input) {
                    if (!input.name) return;
                    input.setAttribute('disabled', '');
                    input.removeAttribute('required');
                });
            }
        }
    }

    updateFormVisibility();

    target.bucket.addEventListener("change", () => {
        toggleNewBucket()
    })

    target.cred.addEventListener("change", () => {
        if (target.service.value === 'rdbms') {
            setTimeout(() => loadRdbmsTable(), 0);
            return;
        }
        const cred = target.cred.value;
        if (cred == "none" || !cred) {
            resetBuckets(false);
            toggleNewBucket()
            return
        }
        resetBuckets(true)
        toggleNewBucket()
    })

    target.region.addEventListener("change", () => {
        if (target.service.value === 'rdbms') {
            loadRdbmsTable();
            return;
        }
        const region = target.region.value;
        if (region == "none" || !region) {
            resetBuckets(false);
            toggleNewBucket()
            return
        }
        resetBuckets(true)
        toggleNewBucket()
    })

    target.btn.addEventListener("click", () => {
        if (target.region.value == "none" || !target.region.value) {
            return;
        }
        target.btn.disabled = true;
        target.btn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>&nbsp;';

        fetchBucketList(target.cred.value, target.region.value, target.provider.value, target.endpoint.value)
            .then(json => {
                resetBuckets(true)

                json.objectStorage.forEach(optionData => {
                    const option = document.createElement("option");
                    option.value = optionData.name;
                    option.textContent = optionData.name;
                    target.bucket.appendChild(option);
                });
            })
            .catch(reason => {
                console.log(reason);
                alert(reason);
            })
            .finally(() => {
                target.btn.disabled = false;
                target.btn.innerHTML = '<i class="fa-solid fa-magnifying-glass"></i>';
                toggleNewBucket()
            })
    });

    function resetBuckets(hardReset) {
        let option = document.createElement("option");
        if(!hardReset) {
            option.value = "none";
            option.textContent = "-";
        } else {
            option.value = "new";
            option.textContent = "create new bucket";
        }
        target.bucket.replaceChildren(option);        
    }

    function toggleNewBucket() {
        const newBucketDiv = document.getElementById("targetNewBucket")
        if (target.bucket.value == "new") {
            newBucketDiv.style.display = ""
            bucketInput.value = ""
        } else {
            newBucketDiv.style.display = "none"
            bucketInput.value = target.bucket.value
        }
    }

    // ── RDBMS instance table ──────────────────────────────────────────
    let restoreRdbmsAllRows = [], restoreRdbmsPage = 1;
    const RESTORE_PAGE_SIZE = 5;

    function rdbmsStatusBadge(status) {
        const s = (status || '').toLowerCase();
        let icon, cls;
        if (s === 'available')                                              { icon = 'bi-check-circle-fill';    cls = 'text-success';   }
        else if (s === 'creating')                                          { icon = 'bi-hourglass-split ic-spin'; cls = 'text-primary'; }
        else if (s.startsWith('configuring') || s === 'modifying' || s === 'upgrading') { icon = 'bi-gear-fill ic-spin-slow'; cls = 'text-info'; }
        else if (s === 'stopped' || s === 'stopping')                       { icon = 'bi-pause-circle-fill';    cls = 'text-warning';   }
        else if (s === 'deleting' || s === 'deleted')                       { icon = 'bi-trash3-fill';          cls = 'text-danger';    }
        else if (s.startsWith('failed') || s.startsWith('incompatible'))    { icon = 'bi-exclamation-circle-fill'; cls = 'text-danger'; }
        else                                                                { icon = 'bi-dash-circle';          cls = 'text-secondary'; }
        return `<span class="${cls} small"><i class="bi ${icon} me-1"></i>${status || '-'}</span>`;
    }

    function makeRestoreRdbmsRow(inst) {
        return `<tr class="restore-rdbms-row" style="cursor:pointer;"
                    data-endpoint="${inst.endpoint || ''}"
                    data-port="${inst.port || ''}">
                    <td class="text-center align-middle" style="width:36px;"><input type="checkbox" class="form-check-input restore-rdbms-check"></td>
                    <td class="small">${inst.instanceId || '-'}</td>
                    <td class="small">${inst.name || '-'}</td>
                    <td>${rdbmsStatusBadge(inst.status)}</td>
                    <td class="small">${inst.engineVersion || '-'}</td>
                    <td class="small text-truncate" style="max-width:200px;" title="${inst.endpoint || ''}">${inst.endpoint || '-'}</td>
                    <td class="small">${inst.port || '-'}</td>
                    <td class="small">${inst.instanceClass || '-'}</td>
                </tr>`;
    }

    function applyRestoreRdbmsFilter() {
        const q = (document.getElementById('rdbms-search')?.value || '').toLowerCase();
        return q ? restoreRdbmsAllRows.filter(r => (r.name || '').toLowerCase().includes(q)) : restoreRdbmsAllRows;
    }

    function renderRestoreRdbmsPagination(total) {
        const container = document.getElementById('restore-rdbms-pagination');
        if (!container || total <= 1) { if (container) container.innerHTML = ''; return; }
        const totalPages = total;
        const range = totalPages <= 7
            ? Array.from({length: totalPages}, (_, i) => i + 1)
            : [1, ...(restoreRdbmsPage > 3 ? ['...'] : []),
               ...Array.from({length: Math.min(3, totalPages-2)}, (_, i) => Math.max(2, restoreRdbmsPage-1) + i).filter(p => p > 1 && p < totalPages),
               ...(restoreRdbmsPage < totalPages - 2 ? ['...'] : []), totalPages];
        const prev = `<li class="page-item ${restoreRdbmsPage===1?'disabled':''}"><a class="page-link" href="#" data-page="${restoreRdbmsPage-1}">‹</a></li>`;
        const next = `<li class="page-item ${restoreRdbmsPage===totalPages?'disabled':''}"><a class="page-link" href="#" data-page="${restoreRdbmsPage+1}">›</a></li>`;
        const pages = range.map(p => p === '...'
            ? `<li class="page-item disabled"><span class="page-link">…</span></li>`
            : `<li class="page-item ${p===restoreRdbmsPage?'active':''}"><a class="page-link" href="#" data-page="${p}">${p}</a></li>`
        ).join('');
        container.innerHTML = `<nav><ul class="pagination pagination-sm mb-0 justify-content-center">${prev}${pages}${next}</ul></nav>`;
        container.querySelectorAll('a.page-link').forEach(link => {
            link.addEventListener('click', e => {
                e.preventDefault();
                const p = parseInt(e.currentTarget.dataset.page);
                if (!isNaN(p)) { restoreRdbmsPage = p; renderRestoreRdbmsTable(); }
            });
        });
    }

    function renderRestoreRdbmsTable() {
        const tbody = document.getElementById('restore-rdbms-table-body');
        if (!tbody) return;
        const filtered = applyRestoreRdbmsFilter();
        const totalPages = Math.max(1, Math.ceil(filtered.length / RESTORE_PAGE_SIZE));
        if (restoreRdbmsPage > totalPages) restoreRdbmsPage = totalPages;

        if (!filtered.length) {
            tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted small py-3">No instances found</td></tr>';
            renderRestoreRdbmsPagination(0);
            return;
        }
        const start = (restoreRdbmsPage - 1) * RESTORE_PAGE_SIZE;
        tbody.innerHTML = filtered.slice(start, start + RESTORE_PAGE_SIZE).map(makeRestoreRdbmsRow).join('');
        tbody.querySelectorAll('.restore-rdbms-row').forEach(row => {
            row.addEventListener('click', () => {
                tbody.querySelectorAll('.restore-rdbms-check').forEach(c => c.checked = false);
                row.querySelector('.restore-rdbms-check').checked = true;
                document.getElementById('mysql-srcHost').value = row.dataset.endpoint;
                document.getElementById('mysql-srcPort').value = row.dataset.port;
                document.getElementById('restore-rdbms-connect').style.display = '';
            });
        });
        renderRestoreRdbmsPagination(totalPages);
    }

    function loadRdbmsTable() {
        const provider = document.getElementById('targetPoint[provider]')?.value || '';
        const region   = document.getElementById('targetRegionSelect')?.value   || '';
        if (!provider || provider === 'none' || !region || region === 'none') return;

        const tbody = document.getElementById('restore-rdbms-table-body');
        if (tbody) tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted small py-3"><span class="spinner-border spinner-border-sm me-2"></span>Loading...</td></tr>';
        document.getElementById('restore-rdbms-connect').style.display = 'none';
        document.getElementById('mysql-srcHost').value = '';
        document.getElementById('mysql-srcPort').value = '';

        fetch('/db/rdbms', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ provider, region })
        })
        .then(r => r.ok ? r.json() : Promise.reject(r.status))
        .then(json => { restoreRdbmsAllRows = json || []; restoreRdbmsPage = 1; renderRestoreRdbmsTable(); })
        .catch(err => { console.error('loadRdbmsTable:', err); restoreRdbmsAllRows = []; restoreRdbmsPage = 1; renderRestoreRdbmsTable(); });
    }

    document.getElementById('rdbms-search')?.addEventListener('input', () => { restoreRdbmsPage = 1; renderRestoreRdbmsTable(); });

    function fetchBucketList(credentialId, region, provider, endpoint) {
        let url = "/objectstorage/buckets";
        if (provider) {
            url += `?filterKey=providerName&filterVal=${encodeURIComponent(provider)}`;
        }
        const jsonData = {
            "targetPoint": {
                "credentialId": parseInt(credentialId),
                "region": region,
                "provider": provider
            }
        }
        if (provider === "ncp") {
            jsonData.targetPoint.endpoint = endpoint || "https://kr.object.ncloudstorage.com";
        } else if (provider === "alibaba" && endpoint) {
            jsonData.targetPoint.endpoint = endpoint;
        }
        const req = {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(jsonData)
        }

        return fetch(url, req)
                    .then(response => {
                        if (!response.ok) {
                            throw new Error(`HTTP error! status: ${response.status}`);
                        }
                        
                        return response.json();
                    });
    }
</script>
