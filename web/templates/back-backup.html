<ol class="breadcrumb mb-1" style="margin-top: 66px;">
    <li class="breadcrumb-item">Back Up</li>
</ol>
<h2 class="page-title" id="title">Object Storage</h2>
<div class="card rounded-3 mb-4 col-auto">
    <ul class="nav nav-tabs pt-2 ps-2" id="serviceTabs">
        <li class="nav-item">
          <a class="nav-link active" href="#">Object Storage</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">SQL Database</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">No-SQL</a>
        </li>
    </ul>
    <div class="card-body">
        <form id="backForm">
            <input type="hidden" id="backSource" value="backup">
            <input type="hidden" id="backDest" value="backup">
            <input type="hidden" id="sourcePoint[provider]" value="none">
            <input type="hidden" id="sourcePoint[endpoint]" name="sourcePoint[endpoint]" value="">
            <input type="hidden" id="srcService" value="objectstorage">
            <div class="card rounded-3 mb-3 p-3">
                <div class="input-group mb-3">
                    <div class="form-floating">
                        <input type="text" class="form-control" id="sourcePointLabel" placeholder="Source" style="border: 0; background-color: white;" value="-" required disabled>
                        <label for="sourcePointLabel">Source</label>
                    </div>
                </div>
                <div id="credentialDiv">
                    <div class="input-group mb-3 me-1">
                        <span class="input-group-text rounded-start"><i class="fa-solid fa-user-secret"></i></span>
                        <div class="form-floating">
                            <select class="form-select form-select-sm rounded-end" id="sourceCredentialSelect" name="sourcePoint[credentialId]">
                                <option value="none" data-provider="none"> - </option>
                            </select>
                            <label for="sourceCredentialSelect">provider - credential name</label>
                        </div>
                    </div>
                    <div class="input-group mb-3">
                        <span class="input-group-text rounded-start"><i class="fa-solid fa-globe"></i></span>
                        <div class="form-floating">
                            <select class="form-select form-select-sm rounded-end" id="sourceRegionSelect" name="sourcePoint[region]">
                                <option value="none" selected> - </option>
                                <optgroup label="AWS regions" data-provider="aws" style="display: none;">
                                    {{ range $index, $value := .AWSRegions }}
                                        <option value="{{ $value }}">{{ $value }}</option>
                                    {{ end }}
                                </optgroup>
                                <optgroup label="GCP regions" data-provider="gcp" style="display: none;">
                                    {{ range $index, $value := .GCPRegions }}
                                        <option value="{{ $value }}">{{ $value }}</option>
                                    {{ end }}
                                </optgroup>
                                <optgroup label="NCP regions" data-provider="ncp" style="display: none;">
                                    {{ range $index, $value := .NCPRegions }}
                                        <option value="{{ $value }}">{{ $value }}</option>
                                    {{ end }}
                                </optgroup>
                                <optgroup label="ALIBABA regions" data-provider="alibaba" style="display: none;">
                                    {{ range $index, $value := .ALIBABARegions }}
                                        <option value="{{ $value }}">{{ $value }}</option>
                                    {{ end }}
                                </optgroup>
                                <optgroup label="IBM regions" data-provider="ibm" style="display: none;">
                                    {{ range $index, $value := .IBMRegions }}
                                        <option value="{{ $value }}">{{ $value }}</option>
                                    {{ end }}
                                </optgroup>
                                <optgroup label="KT regions" data-provider="kt" style="display: none;">
                                    {{ range $index, $value := .KTRegions }}
                                        <option value="{{ $value }}">{{ $value }}</option>
                                    {{ end }}
                                </optgroup>
                                <optgroup label="TENCENT regions" data-provider="tencent" style="display: none;">
                                    {{ range $index, $value := .TencentRegions }}
                                        <option value="{{ $value }}">{{ $value }}</option>
                                    {{ end }}
                                </optgroup>
                            </select>
                            <label for="sourceRegionSelect">Select Region</label>
                        </div>
                    </div>
                </div>
                <div class="form-section mt-3" id="objectstorage" style="display:none;">
                    <div class="input-group mb-3">
                        <span class="input-group-text rounded-start"><i class="fa-solid fa-bucket"></i></span>
                        <div class="form-floating">
                            <select class="form-select form-select-sm rounded-end" id="sourceBucket" name="sourcePoint[bucket]">
                                <option value="-" selected>-</option>
                            </select>
                            <label for="sourceBucket">Bucket</label>
                        </div>
                        <button type="button" class="btn btn-primary rounded-3 ms-2" id="sourceBtn">
                            <i class="fa-solid fa-magnifying-glass"></i>
                        </button>
                    </div>
                    {{ template "filter.html" . }}
                </div>
                <div class="form-section" id="rdbms" style="display:none;">
                    <!-- Instance search + table -->
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <span class="text-muted small fw-semibold">Instance List</span>
                        <div class="input-group input-group-sm" style="width:200px;">
                            <span class="input-group-text"><i class="bi bi-search"></i></span>
                            <input type="text" class="form-control" id="rdbms-search" placeholder="Search by name">
                        </div>
                    </div>
                    <table class="table table-bordered table-sm mb-0">
                        <thead>
                            <tr>
                                <th style="width:36px;"></th>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Status</th>
                                <th>Version</th>
                                <th>Host (endpoint)</th>
                                <th>Port</th>
                                <th>InstanceClass</th>
                            </tr>
                        </thead>
                        <tbody id="rdbms-table-body">
                            <tr><td colspan="8" class="text-center text-muted small py-3">Credential과 Region을 선택하면 인스턴스 목록을 조회합니다</td></tr>
                        </tbody>
                    </table>
                    <div id="rdbms-pagination" class="mt-2"></div>

                    <!-- Connect section: shown after instance selected -->
                    <div id="rdbms-connect-section" style="display:none;" class="mt-3">
                        <div class="input-group mb-3">
                            <span class="input-group-text rounded-start"><i class="fa-solid fa-house"></i></span>
                            <div class="form-floating">
                                <input type="text" class="form-control rounded-end bg-light" id="mysql-srcHost" name="sourcePoint[host]" placeholder="Host / IP" readonly>
                                <label for="mysql-srcHost">Host / IP</label>
                            </div>
                        </div>
                        <div class="input-group mb-3">
                            <span class="input-group-text rounded-start"><i class="fa-solid fa-flag"></i></span>
                            <div class="form-floating">
                                <input type="text" class="form-control rounded-end bg-light" id="mysql-srcPort" name="sourcePoint[port]" placeholder="Port" readonly>
                                <label for="mysql-srcPort">Port</label>
                            </div>
                        </div>
                        <div class="input-group mb-3">
                            <span class="input-group-text rounded-start"><i class="fa-solid fa-user"></i></span>
                            <div class="form-floating">
                                <input type="text" class="form-control rounded-end" id="mysql-srcUsername" name="sourcePoint[username]" placeholder="Username" autocomplete="username">
                                <label for="mysql-srcUsername">Username</label>
                            </div>
                        </div>
                        <div class="input-group mb-3">
                            <span class="input-group-text rounded-start"><i class="fa-solid fa-lock"></i></span>
                            <div class="form-floating">
                                <input type="password" class="form-control rounded-end" id="mysql-srcPassword" name="sourcePoint[password]" placeholder="Password">
                                <label for="mysql-srcPassword">Password</label>
                            </div>
                        </div>
                        <div class="d-flex justify-content-end mb-2">
                            <button type="button" class="btn btn-secondary btn-sm" id="rdbms-load-db-btn">Load Databases</button>
                        </div>
                    </div>

                    <!-- Database section: shown after Load Databases -->
                    <div id="rdbms-db-section" style="display:none;" class="mt-2">
                        <div class="input-group">
                            <span class="input-group-text rounded-start"><i class="fa-solid fa-database"></i></span>
                            <div class="form-floating">
                                <select class="form-select rounded-end" id="mysql-srcDatabase" name="sourcePoint[databaseName]">
                                    <option value="">- Select Database -</option>
                                </select>
                                <label for="mysql-srcDatabase">Database</label>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="form-section mt-3" id="mongo-nrdbms" style="display:none;">
                    <div class="input-group mb-3">
                        <span class="input-group-text rounded-start"><i class="fa-solid fa-house"></i></span>
                        <div class="form-floating">
                            <input type="text" class="form-control rounded-end" id="nosql-srcHost" name="sourcePoint[host]" placeholder="Host / IP">
                            <label for="nosql-srcHost">Host / IP</label>
                        </div>
                    </div>
                    <div class="input-group mb-3">
                        <span class="input-group-text rounded-start"><i class="fa-solid fa-flag"></i></span>
                        <div class="form-floating">
                            <input type="text" class="form-control rounded-end" id="nosql-srcPort" name="sourcePoint[port]" placeholder="Port">
                            <label for="nosql-srcPort">Port</label>
                        </div>
                    </div>
                    <div class="input-group mb-3">
                        <span class="input-group-text rounded-start"><i class="fa-solid fa-user"></i></span>
                        <div class="form-floating">
                            <input type="text" class="form-control rounded-end" id="nosql-srcUsername" name="sourcePoint[username]" placeholder="Username">
                            <label for="nosql-srcUsername">Username</label>
                        </div>
                    </div>
                    <div class="input-group mb-3">
                        <span class="input-group-text rounded-start"><i class="fa-solid fa-lock"></i></span>
                        <div class="form-floating">
                            <input type="password" class="form-control rounded-end" id="nosql-srcPassword" name="sourcePoint[password]" placeholder="Password">
                            <label for="nosql-srcPassword">Password</label>
                        </div>
                    </div>
                    <div class="input-group">
                        <span class="input-group-text rounded-start"><i class="fa-solid fa-database"></i></span>
                        <div class="form-floating">
                            <input type="text" class="form-control rounded-end" id="nosql-databaseName" name="sourcePoint[databaseName]" placeholder="DataBase">
                            <label for="nosql-databaseName">DataBase Name</label>
                        </div>
                    </div>
                </div>            
            </div>
            <div class="card rounded-3 mb-3 p-3">
                <div class="input-group mb-3">
                    <div class="form-floating">
                        <input type="text" class="form-control" id="targetPointLabel" placeholder="Source" style="border: 0; background-color: white;" value="Backup Path" required disabled>
                        <label for="targetPointLabel">Target</label>
                    </div>
                </div>
                <div class="input-group">
                    <span class="input-group-text rounded-start"><i class="fas fa-folder"></i></span>
                    <div class="form-floating">
                        <input type="text" class="form-control rounded-end" id="mig-linux-path" name="targetPoint[path]" value="/tmp/dummy" placeholder="디렉토리 경로">
                        <label for="mig-linux-path">Path</label>
                    </div>
                </div>
            </div>
            <button type="submit" class="btn btn-primary rounded-3 float-end" id="submitBtn">Submit</button>
        </form>
    </div>
</div>
<style>
@keyframes ic-spin      { to { transform: rotate(360deg); } }
@keyframes ic-spin-slow { to { transform: rotate(360deg); } }
.ic-spin      { animation: ic-spin 1.2s linear infinite; display: inline-block; }
.ic-spin-slow { animation: ic-spin-slow 3s linear infinite; display: inline-block; }
</style>
<script>
const source = {
        btn: document.getElementById("sourceBtn"),
        cred: document.getElementById("sourceCredentialSelect"),
        region: document.getElementById("sourceRegionSelect"),
        bucket: document.getElementById("sourceBucket"),
        provider: document.getElementById("sourcePoint[provider]"),
        endpoint: document.getElementById("sourcePoint[endpoint]"),
        service: document.getElementById("srcService")
    };

    document.addEventListener("DOMContentLoaded", () => {
        const tabs = document.querySelectorAll("#serviceTabs .nav-link");
        const serviceMap = {
            "Object Storage": "objectstorage",
            "SQL Database": "rdbms",
            "No-SQL": "nrdbms"
        };

        tabs.forEach(tab => {
            tab.addEventListener("click", e => {
                e.preventDefault(); // a 태그 기본 이동 막기

                // 모든 탭에서 active 제거
                tabs.forEach(t => t.classList.remove("active"));

                // 선택한 탭만 active 추가
                tab.classList.add("active");

                // hidden input 값 갱신 (텍스트 그대로 사용)
                const key = tab.textContent.trim();
                source.service.value = serviceMap[key] || "";

                updateFormVisibility()

                document.getElementById("title").innerHTML = key
            });
        });
        
        source.provider.addEventListener('change', e => {
            updateFormVisibility()
        });
    });

    function updateLabel(provider, service) {
        const serviceMap = {
            nrdbms: {
                aws: "AWS DynamoDB",
                ncp: "Naver MongoDB",
                gcp: "Google Firestore",
                alibaba: "Alibaba MongoDB",
            },
            objectstorage: {
                aws: "AWS S3",
                ncp: "Naver Object Storage",
                gcp: "Google Cloud Storage",
                alibaba: "Alibaba Object Storage",
            },
            rdbms: {
                default: "MySQL",
            },
        };

        let serviceName = "-";
        const providers = serviceMap[service];
        if (providers) {
            serviceName = providers[provider] || providers.default || "-";
        } 

        const select = document.getElementById("sourcePointLabel");   // label 갱신
        select.value = serviceName
    }

    function updateFormVisibility() {
        const service = source.service.value;
        let idToShow = source.provider.value + '-' + service;

        if (service === 'nrdbms' && (source.provider.value === 'ncp' || source.provider.value === 'alibaba')) {
            idToShow = 'mongo-nrdbms';
        }

        updateLabel(source.provider.value, service)

        const credentialDiv = document.getElementById("credentialDiv")
        if(service === 'rdbms') {
            idToShow = 'rdbms';
            credentialDiv.style.display = ""
            credentialDiv.querySelectorAll("select").forEach(input => {
                input.removeAttribute('disabled');
            })
            // reset rdbms sub-sections when switching to rdbms tab
            document.getElementById("rdbms-connect-section").style.display = "none";
            document.getElementById("rdbms-db-section").style.display = "none";
        } else {
            if(service === 'objectstorage') {
                idToShow = 'objectstorage';
            }
            credentialDiv.style.display = ""
            credentialDiv.querySelectorAll("select").forEach(input => {
                input.removeAttribute('disabled');
                input.setAttribute('required', '');
            })

            // No-SQL + NCP/Alibaba 인 경우 Region 선택 불필요
            const regionSelectWrapper = document.getElementById("sourceRegionSelect");
            const regionInputGroup = regionSelectWrapper ? regionSelectWrapper.closest(".input-group") : null;
            const isNoSqlNonRegion = service === 'nrdbms' && (source.provider.value === 'ncp' || source.provider.value === 'alibaba');
            if (regionInputGroup) {
                if (isNoSqlNonRegion) {
                    regionInputGroup.style.display = "none";
                    regionSelectWrapper.removeAttribute('required');
                    regionSelectWrapper.setAttribute('disabled', '');
                } else {
                    regionInputGroup.style.display = "";
                    regionSelectWrapper.removeAttribute('disabled');
                    regionSelectWrapper.setAttribute('required', '');
                }
            }

        }

        const allInputs = document.querySelectorAll('.form-section input, .form-section select, .form-section textarea');
        allInputs.forEach(function(input) {
            if (input.closest('#filterContent')) {
                return; // skip this input
            }

            if (input.type === 'checkbox' || input.type === 'radio') {
                input.checked = false;
            } else if (input.tagName.toLowerCase() === 'select') {
                input.selectedIndex = 0; 
            } else {
                input.value = '';
            }
            input.removeAttribute('required');
        });

        const formSections = document.getElementsByClassName('form-section');
        for (let i = 0; i < formSections.length; i++) {
            let section = formSections[i];
            if (section.id === idToShow) {
                section.style.display = 'block';
                let inputs = section.querySelectorAll('input, select, textarea');
                inputs.forEach(function(input) {
                    if (input.closest('#filterContent') || !input.name) {
                        return; // skip UI-only inputs (no name attr) and filter inputs
                    }

                    input.removeAttribute('disabled');
                    input.setAttribute('required', '');
                });
            } else {
                section.style.display = 'none';
                let inputs = section.querySelectorAll('input, select, textarea');
                inputs.forEach(function(input) {
                    if (input.closest('#filterContent') || !input.name) {
                        return; // skip this input
                    }

                    input.setAttribute('disabled', '');
                    input.removeAttribute('required');
                });
            }
        }
    }

    source.service.addEventListener("change", () => {
        console.log("service changed")
        resetBuckets();
    })

    source.cred.addEventListener("change", () => {
        if (source.service.value === 'rdbms') {
            resetRdbmsTable();
            // initProviderHandlers가 먼저 실행돼 region을 업데이트한 뒤 로드
            setTimeout(loadRdbmsTable, 0);
        } else {
            resetBuckets();
        }
    })

    source.region.addEventListener("change", () => {
        if (source.service.value === 'rdbms') {
            loadRdbmsTable();
        } else {
            resetBuckets();
        }
    })

    source.btn.addEventListener("click", () => {
        if (source.region.value == "none" || !source.region.value) {
            return;
        }
        source.btn.disabled = true;
        source.btn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>&nbsp;';

        fetchBucketList(source.cred.value, source.region.value, source.provider.value, source.endpoint.value)
            .then(json => {
                source.bucket.replaceChildren();
                
                if(json.objectStorage.length > 0) {
                    json.objectStorage.forEach(optionData => {
                        const option = document.createElement("option");
                        option.value = optionData.name;
                        option.textContent = optionData.name;
                        source.bucket.appendChild(option);
                    });
                } else {
                    const option = document.createElement("option");
                    option.value = "none";
                    option.textContent = "no buckets found";
                    source.bucket.appendChild(option);
                }
            })
            .catch(reason => {
                console.log(reason);
                alert(reason);
            })
            .finally(() => {
                source.btn.disabled = false;
                source.btn.innerHTML = '<i class="fa-solid fa-magnifying-glass"></i>';
            })
    });

    function resetBuckets() {
        let option = document.createElement("option");
        option.value = "none";
        option.textContent = "-";
        
        source.bucket.replaceChildren(option)
    }

    function fetchBucketList(credentialId, region, provider, endpoint) {
        let url = "/objectstorage/buckets";
        if (provider) {
            url += `?filterKey=providerName&filterVal=${encodeURIComponent(provider)}`;
        }
        const jsonData = {
            "targetPoint": {
                "credentialId": parseInt(credentialId),
                "region": region,
                "provider": provider
            }
        }
        if (provider === "ncp") {
            jsonData.targetPoint.endpoint = endpoint || "https://kr.object.ncloudstorage.com";
        } else if (provider === "alibaba" && endpoint) {
            jsonData.targetPoint.endpoint = endpoint;
        }
        const req = {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(jsonData)
        }

        return fetch(url, req)
                    .then(response => {
                        if (!response.ok) {
                            throw new Error(`HTTP error! status: ${response.status}`);
                        }
                        
                        return response.json();
                    });
    }

    // function disableAll() {
    //     const allInputs = document.querySelectorAll('.form-section input, .form-section select, .form-section textarea');
    //     allInputs.forEach(function(input) {
    //         if (input.type === 'checkbox' || input.type === 'radio') {
    //             input.checked = false;
    //         } else if (input.tagName.toLowerCase() === 'select') {
    //             input.selectedIndex = 0; 
    //         } else {
    //             input.value = '';
    //         }
    //         input.removeAttribute('required');
    //     });

    //     const formSections = document.getElementsByClassName('form-section');
    //     for (let i = 0; i < formSections.length; i++) {
    //         let section = formSections[i];
    //         section.style.display = 'none';
    //         let inputs = section.querySelectorAll('input, select, textarea');
    //         inputs.forEach(function(input) {
    //             input.setAttribute('disabled', '');
    //             input.removeAttribute('required');
    //         });
    //     }
    // }

    // ── RDBMS instance table ──────────────────────────────────────────
    let srcRdbmsAllRows = [], srcRdbmsPage = 1;
    const SRC_PAGE_SIZE = 10;

    function rdbmsStatusBadge(status) {
        const s = (status || '').toLowerCase();
        let icon, cls;
        if (s === 'available') {
            icon = 'bi-check-circle-fill'; cls = 'text-success';
        } else if (s === 'creating') {
            icon = 'bi-hourglass-split ic-spin'; cls = 'text-primary';
        } else if (s.startsWith('configuring') || s === 'modifying' || s === 'upgrading') {
            icon = 'bi-gear-fill ic-spin-slow'; cls = 'text-info';
        } else if (s === 'stopped' || s === 'stopping') {
            icon = 'bi-pause-circle-fill'; cls = 'text-warning';
        } else if (s === 'deleting' || s === 'deleted') {
            icon = 'bi-trash3-fill'; cls = 'text-danger';
        } else if (s.startsWith('failed') || s.startsWith('incompatible')) {
            icon = 'bi-exclamation-circle-fill'; cls = 'text-danger';
        } else {
            icon = 'bi-dash-circle'; cls = 'text-secondary';
        }
        return `<span class="${cls} small"><i class="bi ${icon} me-1"></i>${status || '-'}</span>`;
    }

    function makeSrcRdbmsRow(inst) {
        return `<tr class="src-rdbms-row" style="cursor:pointer;"
                    data-endpoint="${inst.endpoint || ''}"
                    data-port="${inst.port || ''}">
                    <td class="text-center align-middle" style="width:36px;"><input type="checkbox" class="form-check-input src-rdbms-check"></td>
                    <td class="small">${inst.instanceId || '-'}</td>
                    <td class="small">${inst.name || '-'}</td>
                    <td>${rdbmsStatusBadge(inst.status)}</td>
                    <td class="small">${inst.engineVersion || '-'}</td>
                    <td class="small text-truncate" style="max-width:200px;" title="${inst.endpoint || ''}">${inst.endpoint || '-'}</td>
                    <td class="small">${inst.port || '-'}</td>
                    <td class="small">${inst.instanceClass || '-'}</td>
                </tr>`;
    }

    function applySrcRdbmsFilter() {
        const q = (document.getElementById('rdbms-search').value || '').toLowerCase();
        return q ? srcRdbmsAllRows.filter(r => (r.name || r.instanceId || '').toLowerCase().includes(q)) : srcRdbmsAllRows;
    }

    function renderSrcRdbmsPagination(total) {
        const pages = Math.ceil(total / SRC_PAGE_SIZE) || 1;
        const el = document.getElementById('rdbms-pagination');
        if (pages <= 1) { el.innerHTML = ''; return; }
        let html = '<ul class="pagination pagination-sm mb-0">';
        for (let i = 1; i <= pages; i++) {
            html += `<li class="page-item${i === srcRdbmsPage ? ' active' : ''}"><a class="page-link src-rdbms-page" href="#" data-page="${i}">${i}</a></li>`;
        }
        html += '</ul>';
        el.innerHTML = html;
        el.querySelectorAll('.src-rdbms-page').forEach(a => {
            a.addEventListener('click', e => { e.preventDefault(); srcRdbmsPage = +a.dataset.page; renderSrcRdbmsTable(); });
        });
    }

    function renderSrcRdbmsTable() {
        const filtered = applySrcRdbmsFilter();
        const start = (srcRdbmsPage - 1) * SRC_PAGE_SIZE;
        const page = filtered.slice(start, start + SRC_PAGE_SIZE);
        const tbody = document.getElementById('rdbms-table-body');
        tbody.innerHTML = page.length
            ? page.map(makeSrcRdbmsRow).join('')
            : '<tr><td colspan="8" class="text-center text-muted small py-3">No instances found</td></tr>';
        tbody.querySelectorAll('.src-rdbms-row').forEach(row => {
            row.addEventListener('click', () => onSrcRdbmsRowClick(row));
        });
        renderSrcRdbmsPagination(filtered.length);
    }

    function onSrcRdbmsRowClick(row) {
        document.querySelectorAll('.src-rdbms-check').forEach(c => c.checked = false);
        row.querySelector('.src-rdbms-check').checked = true;
        document.getElementById('mysql-srcHost').value = row.dataset.endpoint;
        document.getElementById('mysql-srcPort').value = row.dataset.port;
        document.getElementById('rdbms-connect-section').style.display = '';
        document.getElementById('rdbms-db-section').style.display = 'none';
    }

    function resetRdbmsTable() {
        srcRdbmsAllRows = []; srcRdbmsPage = 1;
        document.getElementById('rdbms-table-body').innerHTML =
            '<tr><td colspan="8" class="text-center text-muted small py-3">Credential과 Region을 선택하면 인스턴스 목록을 조회합니다</td></tr>';
        document.getElementById('rdbms-pagination').innerHTML = '';
        document.getElementById('rdbms-connect-section').style.display = 'none';
        document.getElementById('rdbms-db-section').style.display = 'none';
    }

    function loadRdbmsTable() {
        const provider = source.provider.value;
        const region   = source.region.value;
        if (!provider || provider === 'none' || !region || region === 'none') return;

        const tbody = document.getElementById('rdbms-table-body');
        tbody.innerHTML = '<tr><td colspan="8" class="text-center py-3"><span class="spinner-border spinner-border-sm"></span></td></tr>';
        document.getElementById('rdbms-connect-section').style.display = 'none';
        document.getElementById('rdbms-db-section').style.display = 'none';

        fetch('/db/rdbms', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ provider, region })
        })
        .then(r => r.ok ? r.json() : Promise.reject(r.status))
        .then(json => {
            srcRdbmsAllRows = json || [];
            srcRdbmsPage = 1;
            renderSrcRdbmsTable();
        })
        .catch(err => {
            console.error('loadRdbmsTable:', err);
            srcRdbmsAllRows = []; srcRdbmsPage = 1;
            renderSrcRdbmsTable();
        });
    }

    function loadRdbmsDatabases() {
        const host = document.getElementById('mysql-srcHost').value;
        const port = document.getElementById('mysql-srcPort').value;
        const username = document.getElementById('mysql-srcUsername').value;
        const password = document.getElementById('mysql-srcPassword').value;
        const provider = source.provider.value;
        const region = source.region.value;
        if (!host || !port || !username || !password) {
            alert('Host, Port, Username, Password를 모두 입력해주세요.');
            return;
        }
        const btn = document.getElementById('rdbms-load-db-btn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';

        fetch('/db/rdbms/databases', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ targetPoint: { provider, region, host, port, username, password } })
        })
        .then(r => r.ok ? r.json() : Promise.reject(r.status))
        .then(json => {
            const sel = document.getElementById('mysql-srcDatabase');
            sel.innerHTML = '<option value="-">-</option>';
            (Array.isArray(json) ? json : json.databases || []).forEach(db => {
                const opt = document.createElement('option');
                opt.value = db; opt.textContent = db;
                sel.appendChild(opt);
            });
            document.getElementById('rdbms-db-section').style.display = '';
        })
        .catch(err => alert(`DB 조회 실패: ${err}`))
        .finally(() => { btn.disabled = false; btn.innerHTML = 'Load Databases'; });
    }

    document.getElementById('rdbms-search').addEventListener('input', () => { srcRdbmsPage = 1; renderSrcRdbmsTable(); });
    document.getElementById('rdbms-load-db-btn').addEventListener('click', loadRdbmsDatabases);

    updateFormVisibility();
</script>
